name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build all packages
        run: npm run build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run changeset:publish
          version: npm run changeset:version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify Publish
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "✅ Packages published to npm!"
          echo "📦 Published versions:"
          npm view @andersonlucasp/tokens version
          npm view @andersonlucasp/components version
          npm view @andersonlucasp/react version
          npm view @andersonlucasp/rn version

      - name: Notify Release PR
        if: steps.changesets.outputs.published == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changesets = fs.readdirSync('.changeset').filter(f => f.endsWith('.md') && f !== 'config.json');

            if (changesets.length > 0) {
              console.log('📝 Pending changesets found:');
              changesets.forEach(f => console.log(`  - ${f}`));
              console.log('📋 A Version Packages PR will be created when changesets are merged');
            } else {
              console.log('✅ All changes have been published!');
            }
