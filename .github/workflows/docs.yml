name: Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Storybook (when available)
        run: echo "📚 Storybook coming soon..."
        continue-on-error: true

      - name: Generate API Docs
        run: |
          echo "📖 Generating documentation..."
          cat <<EOF

          ## Momentum DS API Documentation

          ### Available Packages

          - **@andersonlucasp/tokens** - Design tokens
            - Colors, spacing, typography, semantic tokens
            - CSS custom properties exported
            - TypeScript types available

          - **@andersonlucasp/rn** - React Native Components
            - DsButton, DsInput, DsText, DsView
            - DsCard, DsBadge, DsModal, DsBottomTabBar
            - Hooks: useTheme, useToken, useResponsive

          - **@andersonlucasp/components** - Web Components (in development)

          - **@andersonlucasp/react** - React Wrappers (coming soon)

          ### Installation

          npm install @andersonlucasp/rn @andersonlucasp/tokens

          ### Quick Start

          See README.md for examples and documentation.

          EOF

      - name: Deploy to GitHub Pages (ready)
        run: echo "🚀 GitHub Pages deployment ready for Storybook"
        continue-on-error: true

      - name: Upload documentation
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: |
            README.md
            packages/rn/README.md
            .figma/SETUP_GUIDE.md
          retention-days: 30
